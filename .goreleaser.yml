version: 2

before:
  hooks:
    - go mod tidy
    - go mod verify

builds:
  - id: kubectl-klens
    binary: kubectl-klens
    env:
      - CGO_ENABLED=0
    goos: [linux, darwin]
    goarch: [amd64, arm64]
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.date={{.Date}}

archives:
  - id: default
    formats: [tar.gz]
    name_template: >-
      {{ .ProjectName }}_
      {{- .Version }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else }}{{ .Arch }}{{ end }}
    files:
      - README.md
      - LICENSE*
      - completion/kubectl_complete-klens

krews:
  - name: klens
    ids: [default]
    repository:
      owner: PixiBixi
      name: kubectl-klens
      branch: master
    homepage: "https://github.com/PixiBixi/kubectl-klens"
    short_description: "Quick read-only cluster inspection shortcuts"
    description: |
      klens bundles frequently-used read-only inspection commands: node
      pools, taints, capacity, zones, pods-per-node, requests/limits, image
      counts, pods on a node, PVC bindings, and more.
    caveats: "Run 'kubectl klens completion install' to enable shell completion."
    skip_upload: auto

checksum:
  name_template: 'checksums.txt'

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  filters:
    exclude: ['^docs:', '^test:', '^chore:', 'typo']
  groups:
    - title: Features
      regexp: '^feat'
      order: 0
    - title: Bug Fixes
      regexp: '^fix'
      order: 1
    - title: Others
      order: 999

release:
  github:
    owner: PixiBixi
    name: kubectl-klens
  name_template: "{{.ProjectName}} {{.Version}}"
  draft: false
  prerelease: auto
  mode: replace
